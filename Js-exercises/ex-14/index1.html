<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Do while loop</h1>

    <script>
      let number;

      do {
        number = Number(prompt("Enter a number greater than 10:"));
      } while (number <= 10);

      console.log("Good job! You entered: " + number);
    </script>
  </body>
</html>
