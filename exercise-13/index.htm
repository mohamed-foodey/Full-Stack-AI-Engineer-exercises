<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Section</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Feature Section */
        .feature-section {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            /* Background Color + Image */
            background-color: #333;
            background-image: url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;

            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Heading Style */
        .feature-section h2 {
            font-size: 42px;
            margin-bottom: 15px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* Paragraph Style */
        .feature-section p {
            font-size: 20px;
            max-width: 700px;
            line-height: 1.6;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="feature-section">
        <h2>Special Offer</h2>

        <p>
            Don't miss out on our exclusive deal available this week only!
            Enjoy amazing discounts on selected products and services.
        </p>
    </div>

</body>
</html>
