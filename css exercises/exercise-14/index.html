<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Profile Card */
        .profile-card {
            position: relative;
            height: 450px;
            width: 350px;
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Profile Image */
        .profile-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        /* User Info Overlapping Image */
        .user-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            width: 70%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        /* User Name */
        .user-name {
            font-size: 22px;
            font-weight: bold;
            margin: 0;
            color: #333;
        }

        /* User Location */
        .user-location {
            font-size: 16px;
            color: gray;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://i.pinimg.com/736x/38/8b/eb/388bebd2785614c662f71e26d6e9efa9.jpg" alt="User Profile" class="profile-image">

        <div class="user-info">
            <p class="user-name">John Doe</p>
            <p class="user-location">New York, USA</p>
        </div>
    </div>

</body>
</html>
