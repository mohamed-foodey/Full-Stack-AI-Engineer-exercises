<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Element Selector */
        p {
            color: darkred;
            font-size: 18px;
            line-height: 1.6;
        }

        /* Class Selector */
        .favs {
            color: purple;
            font-size: 17px;
        }

        /* ID Selector */
        #character-name {
            color: black;
            font-size: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    
</head>
<body>
<!-- Character Name -->
    <h1 id="character-name">Scarlett Vane</h1>

    <!-- Character Role -->
    <h2>Movie Villain</h2>

    <!-- Biography -->
    <p>
        Scarlett Vane is a clever and dangerous villain known for her
        mysterious plans and fearless attitude. She appears in action
        movies where she challenges heroes with her intelligence and power.
    </p>

    <!-- Favorite Movies -->
    <h3>Favorite Movies</h3>
    <ul class="favs">
        <li>Joker</li>
        <li>Maleficent</li>
        <li>Cruella</li>
        <li>The Dark Knight</li>
    </ul>
    
</body>
</html>
