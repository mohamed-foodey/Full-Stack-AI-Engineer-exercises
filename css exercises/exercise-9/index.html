<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Quotes</title>

    <style>
        /* General Style */
        body {
            font-family: Georgia, serif;
            background-color: #110c0c;
            padding: 30px;
        }

        .quote {
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            font-size: 20px;
            line-height: 1.6;
        }

        /* Quote 1 */
        #quote1 {
            border: 4px solid darkblue;
            background-color: lightblue;
            text-align: left;
            box-shadow: 3px 3px 10px gray;
        }

        /* Quote 2 */
        #quote2 {
            border: 4px dotted darkred;
            background-color: #ffe6e6;
            text-align: center;
            box-shadow: 3px 3px 10px gray;
        }

        /* Quote 3 */
        #quote3 {
            border: 4px dashed darkgreen;
            background-color: #e6ffe6;
            text-align: right;
            box-shadow: 3px 3px 10px gray;
        }

        /* Quote 4 */
        #quote4 {
            border: 6px double purple;
            background-color: #f3e6ff;
            text-align: justify;
            box-shadow: 4px 4px 12px gray;
        }
    </style>
</head>
<body>

    <div class="quote" id="quote1">
        <p>
            "Logic will get you from A to B. Imagination will take you everywhere."
            - Albert Einstein
        </p>
    </div>

    <div class="quote" id="quote2">
        <p>
            "Be yourself; everyone else is already taken."
            - Oscar Wilde
        </p>
    </div>

    <div class="quote" id="quote3">
        <p>
            "So many books, so little time."
            - Frank Zappa
        </p>
    </div>

    <div class="quote" id="quote4">
        <p>
            "A room without books is like a body without a soul."
            - Marcus Tullius Cicero
        </p>
    </div>

</body>
</html>
