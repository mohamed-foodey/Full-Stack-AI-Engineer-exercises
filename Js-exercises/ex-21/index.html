<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <h1>Reduce method</h1>

    <script>

        // reduce method
        let number = [1, 2, 3, 4, 5];
        let sum = number.reduce((total, number) => total + number, 0);
        console.log(sum);
    </script>
    
</body>
