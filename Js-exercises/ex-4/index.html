<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>functions</h1>

    <script>
        // functions
        function add(a,b){
            return a+b;

        }
        console.log(add(5,10)); 
        console.log(add(10,10));

        // function expression
        let add1=function(a,b){
            return a+b;
        }
        console.log(add1(99,1));
       

        
    </script>
    
</body>
</html>
