<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>arthimatic operators</h1>
    <script>
        // arthimatic operators
        let x=5;
        let y=2;

        console.log(x+y);
        console.log(x-y);
        console.log(x*y);
        console.log(x/y);
        console.log(x%y);
        console.log(x++);
        console.log(x--);
       

    </script>
    
</body>
</html>
