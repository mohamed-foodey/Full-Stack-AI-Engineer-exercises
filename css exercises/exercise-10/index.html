<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interests Page</title>

    <style>
        /* General Section Styling */
        .interest-section {
            width: 80vw;
            height: 50vh;
            margin: 5vh auto;
            padding: 20px;
            border-radius: 10px;
        }

        /* Section Colors */
        #books {
            background-color: lightblue;
        }

        #movies {
            background-color: lightgrey;
        }

        #foods {
            background-color: lightgreen;
        }

        /* Text Styling */
        h1 {
            text-align: center;
            font-size: 24px;
        }

        p {
            text-align: center;
            font-size: 16px;
        }

        ul {
            width: 200px;
            margin: 20px auto;
            font-size: 18px;
        }

        li {
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <!-- Books Section -->
    <div class="interest-section" id="books">
        <h1>Books</h1>
        <p>List your favorite books here!</p>

        <ul>
            <li>Harry Potter</li>
            <li>The Hobbit</li>
            <li>Atomic Habits</li>
        </ul>
    </div>

    <!-- Movies Section -->
    <div class="interest-section" id="movies">
        <h1>Movies</h1>
        <p>List your favorite movies here!</p>

        <ul>
            <li>Interstellar</li>
            <li>Avengers: Endgame</li>
            <li>The Dark Knight</li>
        </ul>
    </div>

    <!-- Foods Section -->
    <div class="interest-section" id="foods">
        <h1>Foods</h1>
        <p>List your favorite foods here!</p>

        <ul>
            <li>Pizza</li>
            <li>Burger</li>
            <li>Pasta</li>
        </ul>
    </div>

</body>
</html>
