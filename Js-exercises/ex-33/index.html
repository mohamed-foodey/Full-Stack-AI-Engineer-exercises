<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 id="header">welcome to my web page</h1>
    <p class="text">this my paragraph</p>
    <button onclick="addContent()">safe</button>
    <button onclick="changeContent()">Modify</button>

    <script>
      // dom manipulating
      function addContent() {
        header.textContent = "hi everyone welcome to manipulating dom elements";
      }
      const text = document.querySelector(".text");

      function changeContent() {
        text.innerHTML =
          "hi welcome to my website <strong> dom manipulation </strong> ";
      }
    </script>
  </body>
</html>
