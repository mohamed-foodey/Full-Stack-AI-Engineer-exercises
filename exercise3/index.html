<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists </title>
</head>
<body>
    <h1>My Favourite places travelled</h1>

        <li>London</li>

        <li>Wake up</li>

        <li>Shower</li>

                <th>Movie</th>
                <th>Year</th>

            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Star Wars</td>
                <td>1977</td>
                <td>5</td>
    
    
</body>
</html>
