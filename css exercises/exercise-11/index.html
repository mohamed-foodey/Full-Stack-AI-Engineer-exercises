<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Sections</title>

    <style>
        .interest-section {
            width: 80vw;
            height: 50vh;
            margin: 5vh auto;
            padding: 20px;
        }

        #books {
            background-color: lightblue;
        }

        #movies {
            background-color: lightgrey;
        }

        #foods {
            background-color: lightgreen;
        }

        .interest-section h1,
        .interest-section p {
            text-align: center;
        }

        .interest-section h1 {
            font-size: 24px;
        }

        .interest-section p,
        .interest-section ul {
            font-size: 16px;
        }

        .interest-section ul {
            width: 37%;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="interest-section" id="books">
        <h1>Books</h1>
        <p>List your favorite books here!</p>

        <ul>
            <li>Atomic Habits</li>
            <li>Rich Dad Poor Dad</li>
            <li>The Alchemist</li>
        </ul>
    </div>

    <div class="interest-section" id="movies">
        <h1>Movies</h1>
        <p>List your favorite movies here!</p>

        <ul>
            <li>Inception</li>
            <li>Avengers: Endgame</li>
            <li>Interstellar</li>
        </ul>
    </div>

    <div class="interest-section" id="foods">
        <h1>Foods</h1>
        <p>List your favorite foods here!</p>

        <ul>
            <li>Pizza</li>
            <li>Burger</li>
            <li>Pasta</li>
        </ul>
    </div>

</body>
</html>
