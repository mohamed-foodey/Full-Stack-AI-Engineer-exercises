<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
        }

        .text-block {
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 18px;
            line-height: 1.6;
            color: #333;
        }

        /* Large padding */
        #block1 {
            background-color: lightblue;
            padding: 40px;
        }

        /* Minimal padding */
        #block2 {
            background-color: lightcoral;
            padding: 8px;
        }

        /* Balanced padding */
        #block3 {
            background-color: lightgreen;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="text-block" id="block1">
        Text Block 1 - Notice the spacious layout inside.
    </div>

    <div class="text-block" id="block2">
        Text Block 2 - A more snug appearance.
    </div>

    <div class="text-block" id="block3">
        Text Block 3 - Perfect for reading with balanced spacing.
    </div>

</body>
</html>
