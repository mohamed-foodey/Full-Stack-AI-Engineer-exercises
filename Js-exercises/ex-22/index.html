<body>
    <p>destructuring</p>
    <script>
        let colors = [ "blue", "green", "red", "yellow"];
        let [blue, green, red, yellow] = colors;
        console.log(blue);
        console.log(green);
        console.log(red);
        console.log(yellow);
    </script>
