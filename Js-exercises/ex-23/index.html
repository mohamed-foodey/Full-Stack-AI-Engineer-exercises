<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Object destructuring</h1>

    <script>
        let cars = {
            make: "Honda",
            model: "Civic",
            year: 2022
        }
        let {make, model, } = cars;
        console.log(make);
        console.log(model);
    </script>
    
</body>
</html>
