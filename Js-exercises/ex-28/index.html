<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Async await</h1>

    <script>
      // async and await assignment
      function fetchDataProducts() {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            let success = true;
            if (success) {
              resolve({
                name: "laptop",
                price: 1000,
                brand: "dell",
                model: "xps 13",
              });
            } else {
              reject("error fetching product data");
            }
          }, 2000);
        });
      }
      // fetchDataProducts()
      // .then((data) => console.log("product data: ",data))
      // .catch((error) => console.error(error));
      async function getProductData() {
        // success case
        try {
          const data = await fetchDataProducts();
          console.log("product data: ", data);
        } catch (error) {
          // error case
          console.error(error);
        }
      }
      getProductData();
    </script>
  </body>
</html>
