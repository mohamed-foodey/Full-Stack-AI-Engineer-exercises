<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage Layout</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        /* Navigation Bar */
        .navbar {
            background-color: navy;
            color: white;
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* Content Boxes */
        .content-box {
            background-color: white;
            border: 2px solid #ccc;
            padding: 30px;
            margin: 20px;
            font-size: 20px;
            text-align: center;
            border-radius: 10px;
        }

        /* Different colors for boxes */
        #box1 {
            background-color: lightblue;
        }

        #box2 {
            background-color: lightgreen;
        }

        #box3 {
            background-color: lightcoral;
        }

        /* Footer */
        .footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <nav class="navbar">Navigation Bar</nav>

    <div class="content-box" id="box1">Content Box 1</div>

    <div class="content-box" id="box2">Content Box 2</div>

    <div class="content-box" id="box3">Content Box 3</div>

    <footer class="footer">Footer</footer>

</body>
</html>
