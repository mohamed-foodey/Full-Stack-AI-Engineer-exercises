<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixed Navbar Layout</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* Fixed Navbar */
    .fixed-navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #222;
      padding: 15px 0;
      text-align: center;
      z-index: 1000;
    }

    /* Navbar Links */
    .fixed-navbar a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .fixed-navbar a:hover {
      color: lightblue;
    }

    /* Sections */
    section {
      height: 100vh;
      padding-top: 80px;
      text-align: center;
      font-size: 24px;
    }

    #home {
      background-color: lightblue;
    }

    #about {
      background-color: lightgreen;
    }

    #services {
      background-color: lightcoral;
    }

    #contact {
      background-color: lightgoldenrodyellow;
    }

    section p {
      margin-top: 150px;
    }

    /* Footer */
    .footer {
      background-color: #222;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 18px;
    }

    .footer a {
      color: lightblue;
      text-decoration: none;
      margin: 0 10px;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Fixed Navbar -->
  <div class="fixed-navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- Sections -->
  <section id="home">
    <p>Home content goes here...</p>
  </section>

  <section id="about">
    <p>About content goes here...</p>
  </section>

  <section id="services">
    <p>Services content goes here...</p>
  </section>

  <section id="contact">
    <p>Contact content goes here...</p>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 My Website. All Rights Reserved.</p>

    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </footer>

</body>
</html>
