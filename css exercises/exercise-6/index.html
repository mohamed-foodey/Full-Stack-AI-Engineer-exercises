<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Excerpt</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
        }

        article {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            width: 70%;
            margin: auto;
        }

        /* Center the title */
        h2 {
            text-align: center;
            color: darkblue;
        }

        /* Comfortable line spacing */
        p {
            font-size: 18px;
            line-height: 1.8;
            color: #333;
        }

        /* Underline important phrases */
        .important {
            text-decoration: underline;
            font-weight: bold;
            color: darkred;
        }
    </style>
</head>
<body>

    <article>
        <h2>Discovering CSS Text Properties</h2>

        <p>
            Exploring the vast capabilities of CSS can significantly improve
            the visual appeal of web content. Paying attention to
            <span class="important">text properties</span>
            not only enhances readability but also user engagement.
        </p>
    </article>

</body>
</html>
