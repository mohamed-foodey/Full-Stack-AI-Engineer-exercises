<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Editorial Magazine Layout</title>

        <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Grid Container */
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            grid-template-rows: repeat(2, 220px);

            gap: 15px;
        }

        /* General Box Style */
        .box {
            color: white;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;

            border-radius: 12px;
        }

        
        .box1 {
            background-color: #0d6efd;
            grid-row: span 2;
        }

       
        .box2 {
            background-color: #28a745;
        }

        .box3 {
            background-color: #dc3545;
        }

        .box4 {
            background-color: #6f42c1;
        }

        .box5 {
            background-color: #fd7e14;
        }
    </style>
    </head>
    <body>

        <div class="container">

            <div class="box box1">
                Featured Article
            </div>

            <div class="box box2">
                Article 2
            </div>

            <div class="box box3">
                Article 3
            </div>

            <div class="box box4">
                Article 4
            </div>

            <div class="box box5">
                Article 5
            </div>

        </div>

    </body>
</html>
