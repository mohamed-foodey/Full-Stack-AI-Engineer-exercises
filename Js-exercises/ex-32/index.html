<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Document</title>
  </head>
  <body>
    <h1>list your hobbies</h1>
    <ul>
      <li>Reading</li>
      <li>Swimming</li>
      <li>Coding</li>
    </ul>
    
    <script>
      // dom assignment

      const header = document.querySelector("h1");
      console.log(header);

      const hobbiesList = document.querySelector("ul");
      console.log(hobbiesList);

      const hobbiesItems = document.querySelectorAll("li");
      console.log(hobbiesItems);
    </script>
  </body>
</html>
