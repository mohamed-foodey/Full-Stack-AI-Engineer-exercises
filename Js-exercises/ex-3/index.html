<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Logical operators</h1>

    <script>
       let isSunny=true;
       let isWeekend=false;

       
       console.log(isSunny && isWeekend);
       console.log(isSunny || isWeekend);
       console.log(!isSunny);
    </script>
    
</body>
</html>
