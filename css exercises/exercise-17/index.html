<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Layout</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #efefef;
    }

   

    /* Navigation Bar */
    .navbar {
      background-color: #e5e5e5;
      text-align: center;
      padding: 30px;
    }

    /* Navigation Buttons */
    .navbar button {
      background-color: #0d6efd;
      color: white;
      border: 2px solid #0a58ca;
      padding: 15px 40px;
      margin: 0 10px;
      font-size: 20px;
      cursor: pointer;
    }

    .navbar button:hover {
      background-color: #0b5ed7;
    }

    /* Gallery */
    .gallery {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 50px;
      flex-wrap: wrap;
    }

    /* Image Card */
    .image-card {
      background-color: white;
      border: 6px solid #d9d9d9;
      padding: 10px;
    }

    .image-card img {
      width: 250px;
      height: 360px;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Navigation -->
    <div class="navbar">
      <button>Home</button>
      <button>About</button>
      <button>Services</button>
      <button>Contact</button>
    </div>

    <!-- Image Gallery -->
    <div class="gallery">

      <div class="image-card">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800" alt="Image 1">
      </div>

      <div class="image-card">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800" alt="Image 2">
      </div>

      <div class="image-card">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800" alt="Image 3">
      </div>

    </div>

  </div>

</body>
</html>
