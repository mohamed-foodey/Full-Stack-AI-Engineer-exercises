<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>comparison operators</h1>

    <script>
        // comparison operators
        let a=15;
        let b= "15";

        console.log(a==b);
        console.log(a!=b);
        console.log(a===b);
        console.log(a!==b);
        console.log(a>b);
        console.log(a<b);
        console.log(a>=b);
        console.log(a<=b);
    </script>
    
</body>
</html>
